server {
    listen 80;
    server_name 5.189.177.18;

    # Frontend (React build)
    location / {
        root /var/www/bcrm/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Django backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Django static/media
    location /static/ {
        alias /var/www/bcrm/backend/staticfiles/;
    }

    location /media/ {
        alias /var/www/bcrm/backend/media/;
    }
}
